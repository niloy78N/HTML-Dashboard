<!DOCTYPE html>
<html lang="en" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Settings | SimLess</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Plus+Jakarta+Sans:wght@500;600;700;800&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = { darkMode: 'class', theme: { extend: { fontFamily: { sans: ['Inter', 'sans-serif'], display: ['Plus Jakarta Sans', 'sans-serif'] } } } }
    </script>
    <link rel="stylesheet" href="style.css">
</head>
<body class="antialiased overflow-hidden flex h-screen selection:bg-[var(--color-primary)] selection:text-white">

    <div id="mobileOverlay" class="fixed inset-0 bg-slate-900/50 backdrop-blur-sm z-30 hidden opacity-0 transition-opacity duration-300 lg:hidden"></div>

    <!-- Sidebar -->
    <aside id="sidebar" class="fixed inset-y-0 left-0 z-40 w-64 transform -translate-x-full lg:translate-x-0 lg:static flex-shrink-0 border-r border-[var(--border-color)] bg-[var(--glass-bg)] backdrop-blur-xl flex flex-col transition-all duration-300 shadow-2xl lg:shadow-none">
        <div class="h-20 flex-shrink-0 flex items-center justify-between px-6 border-b border-[var(--border-color)] relative">
            <div class="flex items-center gap-2 group cursor-pointer transition-all duration-300 px-3 py-2 -ml-3 rounded-2xl hover:bg-[var(--color-primary-light)] relative z-10" onclick="window.location.href='index.html'">
                <img id="brandLogoImg" src="" alt="Company Logo" class="h-8 w-auto hidden object-contain">
                <div id="brandLogoSvg" class="flex items-center gap-2">
                    <div class="w-8 h-8 rounded-lg bg-gradient-to-br from-[var(--color-primary)] to-slate-900 flex items-center justify-center text-white shadow-lg">
                        <i data-lucide="activity" class="w-5 h-5"></i>
                    </div>
                </div>
                <span id="companyNameDisplay" class="ml-2 font-display font-bold text-xl tracking-tight text-[var(--text-primary)]"></span>
            </div>
            <button id="sidebarCloseBtn" class="lg:hidden p-2 text-[var(--text-secondary)] hover:text-[var(--text-primary)] transition-colors"><i data-lucide="x" class="w-5 h-5"></i></button>
        </div>
        <nav id="sidebarNav" class="flex-1 overflow-y-auto py-6 px-4 space-y-1 custom-scrollbar"></nav>
        <div class="p-4 border-t border-[var(--border-color)]">
            <div class="flex items-center gap-3 p-3 rounded-xl bg-[var(--bg-color)] border border-[var(--border-color)] transition-colors hover:border-[var(--color-primary)] cursor-pointer">
                <div id="sidebarUserAvatarFallback" class="w-10 h-10 rounded-full bg-[var(--color-primary)] text-white flex items-center justify-center font-bold shadow-inner"></div>
                <div class="flex-1 min-w-0">
                    <p id="sidebarUserName" class="text-sm font-semibold truncate text-[var(--text-primary)]">Loading...</p>
                    <p id="sidebarUserRole" class="text-xs text-[var(--text-secondary)] truncate">Connecting...</p>
                </div>
            </div>
        </div>
    </aside>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 overflow-hidden relative">
        <header class="h-20 flex-shrink-0 flex items-center justify-between px-6 lg:px-10 border-b border-[var(--border-color)] bg-[var(--glass-bg)] backdrop-blur-xl z-20">
            <div class="flex items-center gap-4">
                <button id="mobileMenuBtn" class="lg:hidden p-2 -ml-2 rounded-lg text-[var(--text-secondary)] hover:bg-[var(--color-primary-light)] transition-colors"><i data-lucide="menu" class="w-6 h-6"></i></button>
                <div class="hidden md:flex items-center gap-2 text-sm font-medium text-[var(--text-secondary)]">
                    <a href="index.html" class="hover:text-[var(--color-primary)] transition-colors flex items-center gap-1"><i data-lucide="home" class="w-4 h-4"></i> Home</a>
                    <i data-lucide="chevron-right" class="w-4 h-4 opacity-50"></i>
                    <span class="text-[var(--text-primary)] font-semibold">Admin Settings</span>
                </div>
            </div>
            
            <div class="flex items-center gap-4 lg:gap-6">
                <button id="themeToggle" class="w-10 h-10 flex items-center justify-center rounded-full bg-[var(--bg-color)] border border-[var(--border-color)] text-[var(--text-secondary)] hover:text-[var(--color-primary)] transition-all shadow-sm"><i id="themeIcon" data-lucide="moon" class="w-5 h-5"></i></button>
            </div>
        </header>

        <main class="flex-1 overflow-y-auto p-6 lg:p-10 custom-scrollbar relative z-10">
            <div class="max-w-3xl mx-auto">
                <div class="mb-8">
                    <h1 class="text-3xl font-display font-bold text-[var(--text-primary)]">Admin Settings</h1>
                    <p class="text-[var(--text-secondary)] mt-2">Manage platform configuration and branding.</p>
                </div>

                <!-- Tabs -->
                <div class="flex border-b border-[var(--border-color)] mb-8">
                    <button onclick="switchTab('branding')" id="tabBtn-branding" class="px-6 py-3 font-semibold text-[var(--color-primary)] border-b-2 border-[var(--color-primary)]">Branding</button>
                    <button onclick="switchTab('api')" id="tabBtn-api" class="px-6 py-3 font-semibold text-[var(--text-secondary)] border-b-2 border-transparent hover:text-[var(--text-primary)]">API Management</button>
                </div>

                <!-- Branding Tab -->
                <div id="tab-branding" class="glass-card p-8 space-y-8 block">
                    <form id="brandingForm" class="space-y-6">
                        <!-- Company Name -->
                        <div>
                            <label class="block text-sm font-semibold text-[var(--text-primary)] mb-2">Company Name</label>
                            <input type="text" id="brandName" value="SimLess" class="w-full px-4 py-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--color-primary)] focus:ring-1 focus:ring-[var(--color-primary)] transition-all" required>
                        </div>
                        
                        <!-- Primary Color -->
                        <div>
                            <label class="block text-sm font-semibold text-[var(--text-primary)] mb-2">Primary Theme Color</label>
                            <div class="flex items-center gap-4">
                                <input type="color" id="brandColor" value="#16a34a" class="w-12 h-12 rounded cursor-pointer border-0 p-0 bg-transparent">
                                <input type="text" id="brandColorText" value="#16a34a" class="w-full px-4 py-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--color-primary)] transition-all uppercase font-mono">
                            </div>
                        </div>

                        <!-- File Uploads -->
                        <div class="space-y-4">
                            <label class="block text-sm font-semibold text-[var(--text-primary)]">Company Logo (PNG)</label>
                            
                            <div class="flex items-center gap-6">
                                <!-- Preview Current Logo -->
                                <div class="w-24 h-24 rounded-xl border border-[var(--border-color)] bg-[var(--bg-color)] flex items-center justify-center p-2 shadow-inner">
                                    <img id="logoPreview" src="" alt="Preview" class="max-w-full max-h-full object-contain hidden">
                                    <div id="logoPreviewFallback" class="text-[var(--text-secondary)] text-xs text-center font-medium">No Logo</div>
                                </div>
                                
                                <div class="flex-1 space-y-3">
                                    <!-- Replace / Upload Logo -->
                                    <label class="px-4 py-2 bg-[var(--color-primary)] text-white font-bold rounded-xl shadow-lg hover:opacity-90 cursor-pointer inline-block transition-colors">
                                        <span>Replace Logo</span>
                                        <input type="file" id="brandLogoFile" accept="image/png" class="hidden">
                                    </label>
                                    <p class="text-xs text-[var(--text-secondary)] font-medium">Upload a PNG file. It will be converted to Base64.</p>
                                    <input type="hidden" id="brandLogo" value="">
                                </div>
                            </div>

                            <div class="mt-4 p-4 rounded-xl border border-[var(--border-color)] bg-slate-50 dark:bg-slate-800/50">
                                <p class="text-sm font-semibold text-[var(--text-primary)] mb-3">Apply logo to:</p>
                                <div class="grid grid-cols-2 md:grid-cols-4 gap-3">
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="applyLogin" checked class="w-4 h-4 text-[var(--color-primary)] rounded border-slate-300 focus:ring-[var(--color-primary)]">
                                        <span class="text-sm text-[var(--text-secondary)] font-medium">Login Page</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="applySidebar" checked class="w-4 h-4 text-[var(--color-primary)] rounded border-slate-300 focus:ring-[var(--color-primary)]">
                                        <span class="text-sm text-[var(--text-secondary)] font-medium">Sidebar</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="applyHeader" checked class="w-4 h-4 text-[var(--color-primary)] rounded border-slate-300 focus:ring-[var(--color-primary)]">
                                        <span class="text-sm text-[var(--text-secondary)] font-medium">Header</span>
                                    </label>
                                    <label class="flex items-center gap-2 cursor-pointer">
                                        <input type="checkbox" id="applyMobileMenu" checked class="w-4 h-4 text-[var(--color-primary)] rounded border-slate-300 focus:ring-[var(--color-primary)]">
                                        <span class="text-sm text-[var(--text-secondary)] font-medium">Mobile Menu</span>
                                    </label>
                                </div>
                            </div>
                        </div>

                        <div>
                            <label class="block text-sm font-semibold text-[var(--text-primary)] mb-2">Company Favicon URL</label>
                            <input type="url" id="brandFavicon" placeholder="e.g. https://example.com/favicon.ico" class="w-full px-4 py-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--color-primary)] transition-all">
                        </div>

                        <div class="pt-6 border-t border-[var(--border-color)] flex justify-end gap-4">
                            <button type="button" class="px-6 py-3 rounded-xl font-semibold text-[var(--text-secondary)] hover:bg-[var(--bg-color)] transition-all" onclick="window.location.reload()">Cancel</button>
                            <button type="submit" class="px-6 py-3 rounded-xl font-semibold text-white bg-[var(--color-primary)] hover:opacity-90 shadow-lg shadow-[var(--color-primary-dim)] transition-all">Save Changes</button>
                        </div>
                    </form>
                </div>

                <!-- API Management Tab -->
                <div id="tab-api" class="glass-card p-8 space-y-8 hidden">
                    <form id="apiForm" class="space-y-6">
                        <div>
                            <label class="block text-sm font-semibold text-[var(--text-primary)] mb-2">Number Provider API Key</label>
                            <div class="flex items-center gap-4">
                                <input type="password" id="simApiKey" placeholder="Enter your Number Provider API Key" class="w-full px-4 py-3 rounded-xl border border-[var(--border-color)] bg-[var(--bg-color)] text-[var(--text-primary)] focus:outline-none focus:border-[var(--color-primary)] transition-all">
                                <button type="button" id="toggleApiKey" class="p-3 bg-[var(--bg-color)] border border-[var(--border-color)] rounded-xl text-[var(--text-secondary)] hover:text-[var(--text-primary)]">
                                    <i data-lucide="eye" class="w-5 h-5"></i>
                                </button>
                            </div>
                        </div>

                        <div class="flex items-center justify-between p-4 bg-slate-50 dark:bg-slate-800/50 rounded-xl border border-[var(--border-color)]">
                            <div>
                                <p class="font-bold text-[var(--text-primary)]">API Connection Status</p>
                                <p id="apiStatusContainer" class="text-sm text-slate-500 font-medium mt-1 flex items-center gap-1">
                                    <i id="apiStatusIcon" data-lucide="help-circle" class="w-4 h-4"></i> 
                                    <span>Not Tested</span>
                                </p>
                            </div>
                            <div class="text-right">
                                <p class="font-bold text-[var(--text-primary)]">Balance</p>
                                <p id="apiBalanceText" class="text-lg font-display text-[var(--text-secondary)]">0.00</p>
                            </div>
                        </div>

                        <div>
                            <label class="flex items-center gap-3 cursor-pointer">
                                <input type="checkbox" id="apiEnabled" class="w-5 h-5 rounded border-slate-300 text-[var(--color-primary)] focus:ring-[var(--color-primary)]">
                                <span class="text-sm font-medium text-[var(--text-primary)]">Enable API globally for all operations</span>
                            </label>
                        </div>

                        <div class="pt-6 border-t border-[var(--border-color)] flex justify-end gap-4">
                            <button type="button" id="testConnectionBtn" class="px-6 py-3 rounded-xl font-semibold text-white bg-blue-500 hover:bg-blue-600 shadow-lg shadow-blue-500/30 transition-all flex items-center gap-2">Test Connection</button>
                            <button type="submit" class="px-6 py-3 rounded-xl font-semibold text-white bg-[var(--color-primary)] hover:opacity-90 shadow-lg shadow-[var(--color-primary-dim)] transition-all">Save Changes</button>
                        </div>
                    </form>
                </div>
            </div>
        </main>
    </div>

    <script src="https://unpkg.com/lucide@latest"></script>
    <script src="app.js"></script>
    <script>
        // Settings specific logic
        document.addEventListener('DOMContentLoaded', () => {
            const role = localStorage.getItem('simless_role');
            if (role !== 'owner') {
                document.body.innerHTML = '<div class="flex h-screen w-full items-center justify-center bg-[var(--bg-color)]"><div class="glass-card p-8 text-center"><h1 class="text-2xl font-bold text-red-500 mb-2">Access Denied</h1><p class="text-[var(--text-secondary)] font-medium">Only the Owner account can access these settings.</p></div></div>';
                setTimeout(() => window.location.href = 'index.html', 2000);
                return;
            }

            const savedBranding = JSON.parse(localStorage.getItem('simless_branding')) || App.defaultBranding;
            
            document.getElementById('brandName').value = savedBranding.companyName;
            document.getElementById('brandColor').value = savedBranding.primaryColor;
            document.getElementById('brandColorText').value = savedBranding.primaryColor;
            document.getElementById('brandLogo').value = savedBranding.logoUrl || '';
            document.getElementById('brandFavicon').value = savedBranding.favicon || '';

            if (savedBranding.logoUrl) {
                document.getElementById('logoPreview').src = savedBranding.logoUrl;
                document.getElementById('logoPreview').classList.remove('hidden');
                document.getElementById('logoPreviewFallback').classList.add('hidden');
            }

            if (savedBranding.applyTo) {
                document.getElementById('applyLogin').checked = savedBranding.applyTo.login !== false;
                document.getElementById('applySidebar').checked = savedBranding.applyTo.sidebar !== false;
                document.getElementById('applyHeader').checked = savedBranding.applyTo.header !== false;
                document.getElementById('applyMobileMenu').checked = savedBranding.applyTo.mobileMenu !== false;
            }

            // Handle API Key visibility
            document.getElementById('toggleApiKey').addEventListener('click', (e) => {
                const input = document.getElementById('simApiKey');
                input.type = input.type === 'password' ? 'text' : 'password';
            });

            // Handle Logo File Upload Base64
            document.getElementById('brandLogoFile').addEventListener('change', function(e) {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = function(evt) {
                        const result = evt.target.result;
                        document.getElementById('brandLogo').value = result;
                        document.getElementById('logoPreview').src = result;
                        document.getElementById('logoPreview').classList.remove('hidden');
                        document.getElementById('logoPreviewFallback').classList.add('hidden');
                    };
                    reader.readAsDataURL(file);
                }
            });

            // Sync color inputs
            document.getElementById('brandColor').addEventListener('input', (e) => {
                document.getElementById('brandColorText').value = e.target.value;
            });
            document.getElementById('brandColorText').addEventListener('input', (e) => {
                document.getElementById('brandColor').value = e.target.value;
            });

            // Form Submit handler
            document.getElementById('brandingForm').addEventListener('submit', (e) => {
                e.preventDefault();
                
                const newBranding = {
                    companyName: document.getElementById('brandName').value,
                    primaryColor: document.getElementById('brandColor').value,
                    logoUrl: document.getElementById('brandLogo').value,
                    favicon: document.getElementById('brandFavicon').value,
                    applyTo: {
                        login: document.getElementById('applyLogin').checked,
                        sidebar: document.getElementById('applySidebar').checked,
                        header: document.getElementById('applyHeader').checked,
                        mobileMenu: document.getElementById('applyMobileMenu').checked
                    }
                };

                localStorage.setItem('simless_branding', JSON.stringify(newBranding));
                
                // Show success
                const btn = e.target.querySelector('button[type="submit"]');
                const originalText = btn.innerText;
                btn.innerText = "Saved!";
                btn.classList.add('bg-green-600');
                
                setTimeout(() => {
                    window.location.reload(); // Reload to apply theme globally
                }, 1000);
            });
            
            // Load Mock API key and settings
            const savedKey = localStorage.getItem('simless_api_key');
            if(savedKey) document.getElementById('simApiKey').value = savedKey;
            
            const apiEnabled = localStorage.getItem('simless_api_enabled');
            if(apiEnabled !== null) {
                document.getElementById('apiEnabled').checked = apiEnabled === 'true';
            }

            // Test Connection
            document.getElementById('testConnectionBtn').addEventListener('click', (e) => {
                const btn = e.currentTarget;
                const originalText = btn.innerHTML;
                const apiKey = document.getElementById('simApiKey').value.trim();
                
                if (!apiKey) {
                    alert("Please enter an API key first.");
                    return;
                }

                btn.innerHTML = `<i data-lucide="loader-2" class="w-4 h-4 animate-spin"></i> Testing...`;
                lucide.createIcons();
                
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    
                    const container = document.getElementById('apiStatusContainer');
                    
                    container.className = "text-sm text-green-500 font-medium mt-1 flex items-center gap-1";
                    container.innerHTML = `<i data-lucide="check-circle" class="w-4 h-4"></i> <span>Connected</span>`;
                    
                    const balanceEl = document.getElementById('apiBalanceText');
                    balanceEl.innerText = "5,240.50 ₽";
                    balanceEl.className = "text-lg font-display text-[var(--color-primary)]";
                    
                    lucide.createIcons();
                }, 1500);
            });
            
            // API Form Submit
            document.getElementById('apiForm').addEventListener('submit', (e) => {
                e.preventDefault();
                const apiKey = document.getElementById('simApiKey').value;
    const isEnabled = document.getElementById('apiEnabled').checked;

    fetch('save_settings.php', {
        method: 'POST',
        headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
        body: `simApiKey=${apiKey}&apiEnabled=${isEnabled}`
    });
                const btn = e.target.querySelector('button[type="submit"]');
                const prev = btn.innerText;
                btn.innerText = "Saved!";
                setTimeout(() => { btn.innerText = prev; }, 1500);
            });
        });

        // Tab Switching
        function switchTab(tabId) {
            document.getElementById('tab-branding').classList.add('hidden');
            document.getElementById('tab-branding').classList.remove('block');
            document.getElementById('tab-api').classList.add('hidden');
            document.getElementById('tab-api').classList.remove('block');
            
            document.getElementById('tabBtn-branding').classList.remove('text-[var(--color-primary)]', 'border-[var(--color-primary)]');
            document.getElementById('tabBtn-branding').classList.add('text-[var(--text-secondary)]', 'border-transparent');
            document.getElementById('tabBtn-api').classList.remove('text-[var(--color-primary)]', 'border-[var(--color-primary)]');
            document.getElementById('tabBtn-api').classList.add('text-[var(--text-secondary)]', 'border-transparent');
            
            document.getElementById(`tab-${tabId}`).classList.remove('hidden');
            document.getElementById(`tab-${tabId}`).classList.add('block');
            document.getElementById(`tabBtn-${tabId}`).classList.remove('text-[var(--text-secondary)]', 'border-transparent');
            document.getElementById(`tabBtn-${tabId}`).classList.add('text-[var(--color-primary)]', 'border-[var(--color-primary)]');
        }
    </script>
</body><script>
    // পেজ লোড হওয়ার সাথে সাথে ডাটাবেস থেকে ডাটা নিয়ে আসার কোড
    window.onload = function() {
        fetch('get_settings.php') // আপনার তৈরি করা সেই নতুন ফাইল
        .then(response => response.json())
        .then(data => {
            if(data.api_key) {
                document.getElementById('simApiKey').value = data.api_key;
            }
        })
        .catch(error => console.log('Error:', error));
    };
</script>
</html>
